<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laskos Studios - Official Booking</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #27ae60; --viber: #7360f2; }
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; margin: 0; 
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://unsplash.com') center center fixed no-repeat;
            background-size: cover; color: #333;
        }

        /* Host Box */
        .host-info {
            position: fixed; top: 20px; left: 20px; background: rgba(255, 255, 255, 0.98);
            padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            z-index: 1000; width: 180px; text-align: center; border-top: 5px solid var(--primary);
        }
        .host-photo { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; border: 3px solid var(--primary); }
        .host-info h4 { margin: 5px 0; font-size: 16px; }
        .host-info p { margin: 2px 0; font-size: 11px; color: #666; }

        .header { text-align: center; color: white; padding: 80px 20px; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        .header h1 { font-size: 4rem; margin: 0; }

        .container { max-width: 1200px; margin: auto; padding: 20px; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; }
        .card { background: rgba(255, 255, 255, 0.95); border-radius: 25px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.3); transition: 0.3s; }
        
        .slideshow { position: relative; height: 250px; background: #000; }
        .mySlides { display: none; width: 100%; height: 100%; object-fit: cover; }
        .prev, .next { cursor: pointer; position: absolute; top: 50%; width: 35px; height: 35px; background: rgba(0,0,0,0.5); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -17px; font-weight: bold; }
        .next { right: 10px; } .prev { left: 10px; }

        .card-body { padding: 20px; text-align: center; }
        .card-body h3 { color: var(--primary); margin-top: 0; }

        /* Booking Area */
        .booking-box { background: #f9f9f9; padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px solid #eee; }
        label { font-size: 12px; font-weight: bold; display: block; margin-top: 10px; text-align: left; }
        input { width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        
        .total-price { font-size: 20px; font-weight: bold; color: var(--secondary); margin: 15px 0; display: none; background: #eef7ee; padding: 10px; border-radius: 10px; }

        .btn-book-now { 
            width: 100%; background: var(--primary); color: white; padding: 18px; 
            border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; 
            cursor: pointer; margin-top: 15px; transition: 0.3s;
        }
        .btn-book-now:hover { background: #1557b0; transform: translateY(-2px); }

        /* Modal Pop-up */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        .modal-content { background: white; max-width: 400px; margin: 100px auto; padding: 30px; border-radius: 25px; text-align: center; position: relative; }
        
        .choice-btn { 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 15px; 
            text-decoration: none; color: white; font-weight: bold; transition: 0.3s;
        }
        .choice-wa { background: #25D366; }
        .choice-viber { background: var(--viber); }
        .choice-chat { background: var(--primary); }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #999; }

        .building-box { max-width: 500px; margin: 40px auto; background: white; padding: 20px; border-radius: 25px; text-align: center; }

        @media (max-width: 600px) { .host-info { position: relative; width: auto; left: 0; top: 0; margin: 10px; } }
    </style>
</head>
<body>

    <div class="host-info">
        <img src="me.jpg" class="host-photo" onerror="this.src='https://placeholder.com'">
        <h4>Host: Kwstas</h4>
        <p>6984725380</p>
        <p>Laskos Studios Official</p>
    </div>

    <div class="header">
        <h1>Laskos Studios</h1>
        <p>Direct Booking & Best Price Guaranteed</p>
    </div>

    <div class="container">
        <div class="grid">
            
            <!-- APARTMENT 1 -->
            <div class="card" id="apt1">
                <div class="slideshow">
                    <img class="slides1 mySlides" src="r1-1.jpg" style="display:block">
                    <img class="slides1 mySlides" src="r1-2.jpg">
                    <a class="prev" onclick="changeSlide(-1, 0)">&#10094;</a><a class="next" onclick="changeSlide(1, 0)">&#10095;</a>
                </div>
                <div class="card-body">
                    <h3>Apartment 1</h3>
                    <div class="booking-box">
                        <label>Άφιξη (Check-in):</label>
                        <input type="date" class="in-date" onchange="calculate(1)">
                        <label>Αναχώρηση (Check-out):</label>
                        <input type="date" class="out-date" onchange="calculate(1)">
                        <div id="total1" class="total-price">Σύνολο: 0€</div>
                        <button class="btn-book-now" onclick="openChoice(1)">BOOK NOW</button>
                    </div>
                </div>
            </div>

            <!-- APARTMENT 2 -->
            <div class="card" id="apt2">
                <div class="slideshow">
                    <img class="slides2 mySlides" src="r2-1.jpg" style="display:block">
                    <img class="slides2 mySlides" src="r2-2.jpg">
                    <a class="prev" onclick="changeSlide(-1, 1)">&#10094;</a><a class="next" onclick="changeSlide(1, 1)">&#10095;</a>
                </div>
                <div class="card-body">
                    <h3>Apartment 2</h3>
                    <div class="booking-box">
                        <label>Άφιξη (Check-in):</label>
                        <input type="date" class="in-date" onchange="calculate(2)">
                        <label>Αναχώρηση (Check-out):</label>
                        <input type="date" class="out-date" onchange="calculate(2)">
                        <div id="total2" class="total-price">Σύνολο: 0€</div>
                        <button class="btn-book-now" onclick="openChoice(2)">BOOK NOW</button>
                    </div>
                </div>
            </div>

            <!-- APARTMENT 3 -->
            <div class="card" id="apt3">
                <div class="slideshow">
                    <img class="slides3 mySlides" src="r3-1.jpg" style="display:block">
                    <img class="slides3 mySlides" src="r3-2.jpg">
                    <a class="prev" onclick="changeSlide(-1, 2)">&#10094;</a><a class="next" onclick="changeSlide(1, 2)">&#10095;</a>
                </div>
                <div class="card-body">
                    <h3>Apartment 3</h3>
                    <div class="booking-box">
                        <label>Άφιξη (Check-in):</label>
                        <input type="date" class="in-date" onchange="calculate(3)">
                        <label>Αναχώρηση (Check-out):</label>
                        <input type="date" class="out-date" onchange="calculate(3)">
                        <div id="total3" class="total-price">Σύνολο: 0€</div>
                        <button class="btn-book-now" onclick="openChoice(3)">BOOK NOW</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- POP-UP MODAL -->
    <div id="choiceModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeChoice()">&times;</span>
            <h3 id="modalTitle">Επιλογή Επικοινωνίας</h3>
            <p id="modalDetails" style="font-size: 14px; color: #666; margin-bottom: 20px;"></p>
            <a href="#" id="linkWA" class="choice-btn choice-wa" target="_blank">WhatsApp</a>
            <a href="#" id="linkViber" class="choice-btn choice-viber" target="_blank">Viber</a>
            <a href="javascript:void(0)" class="choice-btn choice-chat" onclick="closeChoice(); Tawk_API.toggle()">Live Chat</a>
        </div>
    </div>

    <script>
        let slideIndices =;
        let slideClasses = ["slides1", "slides2", "slides3"];
        function changeSlide(n, no) { showSlides(slideIndices[no] += n, no); }
        function showSlides(n, no) {
            let x = document.getElementsByClassName(slideClasses[no]);
            if (n > x.length) slideIndices[no] = 1; if (n < 1) slideIndices[no] = x.length;
            for (let i = 0; i < x.length; i++) x[i].style.display = "none";
            x[slideIndices[no]-1].style.display = "block";
        }

        // PRICE ENGINE
        function getPriceForDate(date) {
            const month = date.getMonth(); // 0=Jan, 3=Apr, 4=May...
            if (month === 3) return 70; // Apr
            if (month === 4 || month === 9) return 80; // May, Oct
            if (month === 5) return 110; // Jun
            if (month === 6 || month === 7) return 150; // Jul, Aug
            if (month === 8) return 100; // Sep
            return 50; // Winter months
        }

        function calculate(id) {
            const card = document.getElementById('apt' + id);
            const inVal = card.querySelector('.in-date').value;
            const outVal = card.querySelector('.out-date').value;
            const totalDiv = document.getElementById('total' + id);

            if (inVal && outVal) {
                let start = new Date(inVal);
                let end = new Date(outVal);
                if (end > start) {
                    let total = 0;
                    let nights = 0;
                    let current = new Date(start);
                    while (current < end) {
                        total += getPriceForDate(current);
                        nights++;
                        current.setDate(current.getDate() + 1);
                    }
                    totalDiv.innerText = `Σύνολο (${nights} νύχτες): ${total}€`;
                    totalDiv.style.display = "block";
                    return { total, nights, inVal, outVal };
                }
            }
            totalDiv.style.display = "none";
            return null;
        }

        function openChoice(id) {
            const res = calculate(id);
            if (!res) { alert("Παρακαλώ επιλέξτε έγκυρες ημερομηνίες!"); return; }
            const phone = "306984725380";
            const text = `ΚΡΑΤΗΣΗ: Apartment ${id}%0AΆφιξη: ${res.inVal}%0AΑναχώρηση: ${res.outVal}%0AΝύχτες: ${res.nights}%0AΣύνολο: ${res.total}€`;
            
            document.getElementById('linkWA').href = `https://wa.me{phone}?text=${text}`;
            document.getElementById('linkViber').href = `viber://chat?number=${phone}&draft=${text}`;
            document.getElementById('modalDetails').innerText = `Apartment ${id} | ${res.nights} νύχτες | ${res.total}€`;
            document.getElementById('choiceModal').style.display = "block";
        }
        function closeChoice() { document.getElementById('choiceModal').style.display = "none"; }
    </script>

    <!-- Tawk.to -->
    <script type="text/javascript">
    var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();

    s1.charset='UTF-8'; s1.setAttribute('crossorigin','*'); s0.parentNode.insertBefore(s1,s0);
    })();
    </script>
</body>
</html>
