    <style>
        /* Background & General */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://unsplash.com') center center fixed no-repeat;
            background-size: cover;
            color: #333;
        }

        /* Host Info Box */
        .host-info {
            position: fixed; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            font-size: 14px; z-index: 1000; border-top: 4px solid #1a73e8;
            max-width: 200px; text-align: center;
        }
        .host-photo {
            width: 90px; height: 90px; border-radius: 50%; 
            object-fit: cover; /* Αυτό εμποδίζει το "τέντωμα" */
            margin-bottom: 10px; border: 3px solid #1a73e8;
            background-color: #eee;
        }

        .header { text-align: center; color: white; padding: 80px 20px; text-shadow: 3px 3px 10px rgba(0,0,0,0.8); }
        .header h1 { font-size: 4.5rem; margin: 0; }

        .container { max-width: 1200px; margin: auto; padding: 20px; }

        /* Grid Layout */
        .apartments-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; margin-bottom: 50px;
        }

        .card { 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 20px; overflow: hidden; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            display: flex; flex-direction: column;
            backdrop-filter: blur(5px);
        }

        .slideshow-container { position: relative; width: 100%; height: 250px; cursor: pointer; background: #ddd; }
        .mySlides { display: none; width: 100%; height: 100%; object-fit: cover; }
        
        .prev, .next {
            cursor: pointer; position: absolute; top: 50%; width: auto; padding: 10px; margin-top: -22px;
            color: white; font-weight: bold; font-size: 18px; background: rgba(0,0,0,0.5); border-radius: 5px;
        }
        .next { right: 0; }

        .card-body { padding: 20px; flex-grow: 1; text-align: center; }
        .card-body h3 { margin: 0 0 10px 0; color: #1a73e8; font-size: 1.4rem; border-bottom: 2px solid #27ae60; display: inline-block; }

        /* Buttons */
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { 
            padding: 10px; text-align: center; text-decoration: none; border-radius: 8px; 
            font-weight: bold; font-size: 13px; color: white; transition: 0.3s;
        }
        .btn-wa { background: #25D366; }
        .btn-viber { background: #7360f2; }
        .btn-chat { background: #1a73e8; grid-column: span 2; }

        iframe { width: 100%; height: 350px; border: none; border-radius: 12px; margin-top: 15px; }

        .building-box { 
            max-width: 500px; margin: 40px 0 40px auto; 
            background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* Modal / Lightbox */
        .modal {
            display: none; position: fixed; z-index: 9999; padding-top: 50px;
            left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9);
        }
        .modal-content { margin: auto; display: block; max-width: 90%; max-height: 85%; border-radius: 10px; }
        .close { position: absolute; top: 20px; right: 40px; color: white; font-size: 50px; cursor: pointer; }
    </style>

    <script>
        let slideIndices =;
        let slideClasses = ["room1-slides", "room2-slides", "room3-slides", "build-slides"];

        function changeSlide(n, no) { showSlides(slideIndices[no] += n, no); }
        function showSlides(n, no) {
            let i; let x = document.getElementsByClassName(slideClasses[no]);
            if (n > x.length) {slideIndices[no] = 1} if (n < 1) {slideIndices[no] = x.length}
            for (i = 0; i < x.length; i++) { x[i].style.display = "none"; }
            if(x[slideIndices[no]-1]) x[slideIndices[no]-1].style.display = "block";
        }
        for(let i=0; i<4; i++) { showSlides(1, i); }

        function openModal(src) {
            document.getElementById('myModal').style.display = "block";
            document.getElementById('img01').src = src;
        }
    </script>
