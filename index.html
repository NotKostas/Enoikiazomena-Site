<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laskos Studios - Official Booking</title>
    <!-- Flatpickr CSS για όμορφα και σωστά ημερολόγια -->
    <link rel="stylesheet" href="https://jsdelivr.net">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com">
    
    <style>
        :root { 
            --primary: #00d2ff; 
            --deep-blue: rgba(0, 30, 60, 0.88); 
            --accent: #0077be;  
            --secondary: #27ae60; 
            --text: #ffffff;
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; 
            background: linear-gradient(135deg, #001220 0%, #002b5c 50%, #00509d 100%);
            background-attachment: fixed; color: var(--text); min-height: 100vh;
        }

        .host-info {
            position: fixed; top: 20px; left: 20px; background: var(--deep-blue);
            padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1000; width: 180px; text-align: center; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
        }
        .host-photo { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 12px; border: 3px solid var(--primary); }
        .host-info h4 { margin: 5px 0; font-size: 18px; color: var(--primary); }
        .host-info p { margin: 2px 0; font-size: 12px; color: #ddd; }

        .header { text-align: center; color: white; padding: 100px 20px 60px; text-shadow: 2px 4px 15px rgba(0,0,0,0.5); }
        .header h1 { font-size: 4.5rem; margin: 0; font-weight: 900; }

        .container { max-width: 1300px; margin: auto; padding: 20px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 35px; }
        .card { 
            background: var(--deep-blue); border-radius: 35px; overflow: hidden; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); transition: 0.4s ease; 
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
        }
        
        .slideshow-container { position: relative; height: 300px; background: #000; }
        .mySlides { display: none; width: 100%; height: 100%; object-fit: cover; animation: fade 0.5s; }
        @keyframes fade { from {opacity: 0.4} to {opacity: 1} }

        .build-container { height: 600px !important; background: #080808 !important; }
        .build-slides { object-fit: contain !important; }

        .prev, .next {
            cursor: pointer; position: absolute; top: 50%; width: 40px; height: 40px; 
            background: rgba(0,0,0,0.6); color: white; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; margin-top: -20px; font-weight: bold;
            z-index: 2; text-decoration: none;
        }
        .next { right: 15px; } .prev { left: 15px; }

        .card-body { padding: 35px; text-align: center; }
        .card-body h3 { color: var(--primary); margin-top: 0; font-size: 2rem; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 15px; }

        .booking-box { background: rgba(255, 255, 255, 0.05); padding: 25px; border-radius: 25px; margin-top: 20px; }
        label { font-size: 13px; font-weight: bold; display: block; margin-top: 15px; text-align: left; color: var(--primary); text-transform: uppercase; }
        
        /* Custom Styling για τα νέα ημερολόγια */
        .date-input { 
            width: 100%; padding: 14px; margin-top: 8px; border-radius: 15px; 
            border: 1px solid var(--primary); box-sizing: border-box; font-size: 16px;
            background: white !important; color: #000 !important; font-weight: bold; text-align: center;
        }
        
        .total-price-box { background: var(--secondary); color: white; padding: 15px; border-radius: 18px; margin-top: 20px; display: none; font-weight: 800; font-size: 1.2rem; }

        .btn-book-now { 
            width: 100%; background: var(--accent); color: white; padding: 20px; 
            border: none; border-radius: 18px; font-weight: 900; font-size: 1.3rem; 
            cursor: pointer; margin-top: 20px; transition: 0.3s;
        }

        .building-box { 
            max-width: 1100px; margin: 80px auto; background: var(--deep-blue); padding: 50px; 
            border-radius: 40px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .modal { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0, 10, 30, 0.95); backdrop-filter: blur(15px); }
        .modal-content { background: var(--deep-blue); max-width: 420px; margin: 100px auto; padding: 45px; border-radius: 40px; text-align: center; position: relative; border: 1px solid var(--primary); }
        .choice-btn { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 20px; margin-bottom: 18px; border-radius: 20px; text-decoration: none; color: white; font-weight: 900; transition: 0.3s; font-size: 1.1rem; }
        .choice-wa { background: #25D366; } .choice-viber { background: #7360f2; } .choice-chat { background: var(--accent); }
        .close-modal { position: absolute; top: 25px; right: 25px; font-size: 35px; cursor: pointer; color: #fff; }

        @media (max-width: 768px) {
            .host-info { position: static; width: 90%; margin: 20px auto; }
            .header h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="host-info">
        <img src="me.jpg" class="host-photo" onerror="this.src='https://placeholder.com'">
        <h4>Host: Kwstas</h4>
        <p>+30 6984725380</p>
        <p>Laskos Studios Official</p>
    </div>

    <div class="header">
        <h1>Laskos Studios</h1>
        <p>Select your dates (Day/Month/Year)</p>
    </div>

    <div class="container">
        <div class="grid">
            <!-- APARTMENT 1 -->
            <div class="card" id="apt1">
                <div class="slideshow-container">
                    <img class="slides1 mySlides" src="r1-1.jpg" style="display:block">
                    <img class="slides1 mySlides" src="r1-2.jpg">
                    <a class="prev" onclick="plusSlides(-1, 0)">&#10094;</a><a class="next" onclick="plusSlides(1, 0)">&#10095;</a>
                </div>
                <div class="card-body">
                    <h3>Apartment 1</h3>
                    <div class="booking-box">
                        <label>Arrival Date:</label>
                        <input type="text" class="date-input in-date" placeholder="DD/MM/2026">
                        <label>Departure Date:</label>
                        <input type="text" class="date-input out-date" placeholder="DD/MM/2026">
                        <div id="total-box1" class="total-price-box"></div>
                        <button class="btn-book-now" onclick="openBooking(1)">BOOK NOW</button>
                    </div>
                </div>
            </div>

            <!-- APARTMENT 2 -->
            <div class="card" id="apt2">
                <div class="slideshow-container">
                    <img class="slides2 mySlides" src="r2-1.jpg" style="display:block">
                    <img class="slides2 mySlides" src="r2-2.jpg">
                    <a class="prev" onclick="plusSlides(-1, 1)">&#10094;</a><a class="next" onclick="plusSlides(1, 1)">&#10095;</a>
                </div>
                <div class="card-body">
                    <h3>Apartment 2</h3>
                    <div class="booking-box">
                        <label>Arrival Date:</label>
                        <input type="text" class="date-input in-date" placeholder="DD/MM/2026">
                        <label>Departure Date:</label>
                        <input type="text" class="date-input out-date" placeholder="DD/MM/2026">
                        <div id="total-box2" class="total-price-box"></div>
                        <button class="btn-book-now" onclick="openBooking(2)">BOOK NOW</button>
                    </div>
                </div>
            </div>

            <!-- APARTMENT 3 -->
            <div class="card" id="apt3">
                <div class="slideshow-container">
                    <img class="slides3 mySlides" src="r3-1.jpg" style="display:block">
                    <img class="slides3 mySlides" src="r3-2.jpg">
                    <a class="prev" onclick="plusSlides(-1, 2)">&#10094;</a><a class="next" onclick="plusSlides(1, 2)">&#10095;</a>
                </div>
                <div class="card-body">
                    <h3>Apartment 3</h3>
                    <div class="booking-box">
                        <label>Arrival Date:</label>
                        <input type="text" class="date-input in-date" placeholder="DD/MM/2026">
                        <label>Departure Date:</label>
                        <input type="text" class="date-input out-date" placeholder="DD/MM/2026">
                        <div id="total-box3" class="total-price-box"></div>
                        <button class="btn-book-now" onclick="openBooking(3)">BOOK NOW</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="building-box">
            <h2 style="color:var(--primary)">Building & Interior Design</h2>
            <div class="slideshow-container build-container">
                <img class="slidesB mySlides build-slides" src="b1.jpg" style="display:block">
                <img class="slidesB mySlides build-slides" src="b2.jpg">
                <a class="prev" onclick="plusSlides(-1, 3)">&#10094;</a><a class="next" onclick="plusSlides(1, 3)">&#10095;</a>
            </div>
        </div>
    </div>

    <div id="choiceModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h3 id="modalTitle" style="color:var(--primary); font-size: 1.8rem; margin-bottom: 25px;">Reserve Your Stay</h3>
            <a href="#" id="linkWA" class="choice-btn choice-wa" target="_blank">Contact via WhatsApp</a>
            <a href="#" id="linkViber" class="choice-btn choice-viber" target="_blank">Contact via Viber</a>
            <a href="javascript:void(0)" class="choice-btn choice-chat" onclick="closeModal(); Tawk_API.toggle()">Start Live Chat</a>
        </div>
    </div>

    <script src="https://jsdelivr.net"></script>
    <script>
        let slideIndex =;
        let slideId = ["slides1", "slides2", "slides3", "slidesB"];
        function plusSlides(n, no) { showSlides(slideIndex[no] += n, no); }
        function showSlides(n, no) {
            let i; let x = document.getElementsByClassName(slideId[no]);
            if (n > x.length) {slideIndex[no] = 1} if (n < 1) {slideIndex[no] = x.length}
            for (i = 0; i < x.length; i++) { x[i].style.display = "none"; }
            x[slideIndex[no]-1].style.display = "block";
        }

        // Τιμοκατάλογος
        const monthPrices = { 0:50, 1:50, 2:50, 3:70, 4:80, 5:110, 6:150, 7:150, 8:100, 9:80, 10:50, 11:50 };

        // Αρχικοποίηση Flatpickr (Day/Month/Year)
        document.addEventListener('DOMContentLoaded', function() {
            const configs = {
                dateFormat: "d/m/Y",
                minDate: "01/01/2026",
                maxDate: "31/12/2026",
                defaultDate: "01/05/2026",
                onChange: function(selectedDates, dateStr, instance) {
                    const id = instance.element.closest('.card').id.replace('apt', '');
                    updatePrice(id);
                }
            };
            flatpickr(".date-input", configs);
        });

        function calculateTotal(id) {
            const card = document.getElementById('apt' + id);
            const inStr = card.querySelector('.in-date').value;
            const outStr = card.querySelector('.out-date').value;
            if (!inStr || !outStr) return null;

            // Μετατροπή DD/MM/YYYY σε Date Object
            const parseDate = (str) => {
                const parts = str.split('/');
                return new Date(parts[2], parts[1] - 1, parts[0]);
            };

            let start = parseDate(inStr);
            let end = parseDate(outStr);
            if (end <= start) return null;

            let total = 0; let nights = 0; let current = new Date(start);
            while (current < end) {
                total += monthPrices[current.getMonth()];
                nights++;
                current.setDate(current.getDate() + 1);
            }
            return { total, nights, inStr, outStr };
        }

        function updatePrice(id) {
            const res = calculateTotal(id);
            const box = document.getElementById('total-box' + id);
            if (res) { box.innerText = `TOTAL: ${res.total}€ (${res.nights} NIGHTS)`; box.style.display = "block"; }
            else { box.style.display = "none"; }
        }

        function openBooking(id) {
            const res = calculateTotal(id);
            if (!res) { alert("Please select valid dates (Day/Month/Year)!"); return; }
            const phone = "306984725380";
            const text = `BOOKING REQUEST: Apartment ${id}%0ACheck-in: ${res.inStr}%0ACheck-out: ${res.outStr}%0ANights: ${res.nights}%0ATotal: ${res.total}€`;
            document.getElementById('linkWA').href = `https://wa.me{phone}?text=${text}`;
            document.getElementById('linkViber').href = `viber://chat?number=${phone}&draft=${text}`;
            document.getElementById('modalTitle').innerText = `Apartment ${id}: ${res.total}€`;
            document.getElementById('choiceModal').style.display = "block";
        }
        function closeModal() { document.getElementById('choiceModal').style.display = "none"; }
    </script>

    </script>
</body>
</html>
