<script>
let slideIndices =;
let slideClasses = ["build-slides", "room1-slides", "room2-slides", "room3-slides"];
function changeSlide(n, no) { showSlides(slideIndices[no] += n, no); }
function showSlides(n, no) {
  let i; let x = document.getElementsByClassName(slideClasses[no]);
  if (n > x.length) {slideIndices[no] = 1} if (n < 1) {slideIndices[no] = x.length}
  for (i = 0; i < x.length; i++) { x[i].style.display = "none"; }
  x[slideIndices[no]-1].style.display = "block";
}
for(let i=0; i<4; i++) { showSlides(1, i); }
</script>
